name: Deploy Frontend

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase Repository Name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Environment File
        run: |
          mkdir -p src/environments
          echo "${{ secrets.ENV_FRONTEND_PROD }}" > src/environments/environment.prod.ts
          echo "${{ secrets.ENV_FRONTEND_PROD }}" > src/environments/environment.ts

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LC }}:latest,${{ env.REGISTRY }}/${{ env.REPO_LC }}:${{ github.sha }}

      - name: Copy docker-compose to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: 'docker-compose.prod.yml'
          target: '/opt/frontend/'

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export GITHUB_REPOSITORY_LOWERCASE="${{ env.REPO_LC }}"
            export IMAGE_TAG="${{ github.sha }}"
            cd /opt/frontend/
            mv docker-compose.prod.yml docker-compose.yml

            docker compose pull
            docker compose up -d

            docker image prune -af --filter "until=168h"
