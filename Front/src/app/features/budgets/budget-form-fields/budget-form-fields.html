<ng-container [formGroup]="form()">
  <div class="form-field">
    <label [for]="idPrefix() + '-amount'">{{ 'budgets.amount' | translate }}</label>
    <input
      [id]="idPrefix() + '-amount'"
      type="number"
      step="0.01"
      formControlName="amount"
      placeholder="0.00"
    />
  </div>
  <div class="form-field">
    <label [for]="idPrefix() + '-alert'">{{ 'budgets.alert_threshold' | translate }}</label>
    <input
      [id]="idPrefix() + '-alert'"
      type="number"
      step="0.01"
      min="0"
      formControlName="alert_threshold"
      placeholder="0.00"
    />
  </div>
  <div class="form-field form-field--checkbox">
    <label>
      <input type="checkbox" formControlName="alert_enabled" />
      {{ 'budgets.alert_enabled' | translate }}
    </label>
  </div>
</ng-container>
