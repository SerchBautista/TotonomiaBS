<section class="cta-banner card-surface">
  <div class="cta-banner__copy">
    <h2>{{ title }}</h2>
    <p>{{ subtitle }}</p>
  </div>
  <div class="cta-banner__actions">
    <a [routerLink]="primaryCtaLink" class="btn primary">{{ primaryCta }}</a>
    <a [routerLink]="secondaryCtaLink" class="btn secondary">{{ secondaryCta }}</a>
  </div>
</section>
